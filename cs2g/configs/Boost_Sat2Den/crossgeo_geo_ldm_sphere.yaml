model:
  base_learning_rate: 1.0e-05
  target: models.crossgeo_geo_ldm.crossgeo_txt_control.CrossGEO_Sat2Den_ddpm
  params:
    base_learning_rate: 1.0e-05
    AE_config:
      target: models.autoencoder.autoencoder.AutoencoderKL
      params:
        embed_dim: 4
        monitor: val/rec_loss
        ddconfig:
          double_z: true
          z_channels: 4
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
          - 1
          - 2
          - 4
          - 4
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
        lossconfig:
          target: torch.nn.Identity
          params: {}
    AE_ckpt_path: ./ckpt/sd-v1-4.ckpt
    DDPM_config:
      target: models.crossgeo_geo_ldm_diffusion.crossgeo_latent_diffusion.CrossGEODDPM
      params:
        linear_start: 0.00085
        linear_end: 0.012
        timesteps: 1000
        unet_config:
          target: models.crossgeo_geo_ldm_diffusion.openaimodel.UNetModel
          params:
            image_size: 32
            in_channels: 4
            out_channels: 4
            model_channels: 320
            attention_resolutions:
            - 4
            - 2
            - 1
            num_res_blocks: 2
            channel_mult:
            - 1
            - 2
            - 4
            - 4
            num_heads: 8
            use_spatial_transformer: true
            transformer_depth: 1
            context_dim: 768
            use_checkpoint: false
            legacy: False
        control_grd:
          target: models.crossgeo_geo_ldm.grd_condition_model.UNetModel
          params:
            image_size: 32
            in_channels: 4
            out_channels: 4
            model_channels: 320
            attention_resolutions:
            - 4
            - 2
            - 1
            num_res_blocks: 2
            channel_mult:
            - 1
            - 2
            - 4
            - 4
            num_heads: 8
            use_spatial_transformer: true
            transformer_depth: 1
            context_dim: 768
            use_checkpoint: true
            legacy: False
        spherical_controlnet_config:
          target: models.spherical_controlnet.SphericalControlNet
          params:
            in_channels: 4
            model_channels: 320
            hint_channels: 3
            num_res_blocks: 2
            attention_resolutions:
            - 4
            - 2
            - 1
            dropout: 0
            channel_mult:
            - 1
            - 2
            - 4
            - 4
            conv_resample: true
            dims: 2
            num_heads: 8
            use_spatial_transformer: true
            transformer_depth: 1
            context_dim: 768
            use_checkpoint: false
            legacy: False

    Condition_config_grd:
      target: ldm.modules.encoders.modules.CLIPVisionEmbedder
    Condition_config_sat:
      target: models.CVUSA_geo_ldm.condition_model.VIT_224
    pre_sat2grd_model_path:
    pre_ldm_model_path: ./ckpt/sd-v1-4.ckpt
    scale_factor: 0.18215
    Condition_config_txt:
      target: ldm.modules.encoders.modules.FrozenCLIPEmbedder
    use_spherical_control: true
    SphericalControlNet_config:
      target: models.spherical_controlnet.SphericalControlNet
      params:
        in_channels: 4
        model_channels: 320
        hint_channels: 3
        num_res_blocks: 2
        attention_resolutions:
        - 4
        - 2
        - 1
        dropout: 0
        channel_mult:
        - 1
        - 2
        - 4
        - 4
        conv_resample: true
        dims: 2
        num_heads: 8
        use_spatial_transformer: true
        transformer_depth: 1
        context_dim: 768
        use_checkpoint: false
        legacy: False

data:
  target: dataloader.dataload.DataModuleFromConfig
  params:
    batch_size: 2
    wrap: True
    train:
      target: dataloader.crossgeo_txt.CrossGEODataset
      params:
        data_root: ./dataset/crossgeo/data/
        sat_size: [256, 256]
        pano_size: [256, 256]
        split: train
        include_uav: false
    test:
      target: dataloader.crossgeo_txt.CrossGEODataset
      params:
        data_root: ./dataset/crossgeo/data/
        sat_size: [256, 256]
        pano_size: [256, 256]
        split: val
        include_uav: false

lightning:
  callbacks:
    image_logger:
      target: utils.callback.callback.ImageLogger
      params:
        batch_frequency: 200
        max_images: 4

  trainer:
    benchmark: True
    accumulate_grad_batches: 2
